function speak(text, karaokeId=null){

  const u = new SpeechSynthesisUtterance(text); u.lang='de-DE'; u.rate=state.rate; u.pitch=state.pitch;
  const voice = state.voices.find(v=>v.name===state.voiceName) || state.voices.find(v=>v.lang.startsWith('de'));
  if(voice) u.voice = voice;
  if(karaokeId){ u.onboundary = e => { document.querySelectorAll(`[data-karaoke="${karaokeId}"]`).forEach(x=>x.classList.remove('karaoke-highlight')); const spans=[...document.querySelectorAll(`[data-karaoke="${karaokeId}"]`)]; const hit=spans.reduce((prev,cur)=> Number(cur.dataset.start)<=e.charIndex?cur:prev, null); if(hit) hit.classList.add('karaoke-highlight'); }; u.onend=()=>document.querySelectorAll(`[data-karaoke="${karaokeId}"]`).forEach(x=>x.classList.remove('karaoke-highlight')); }
  speechSynthesis.speak(u);
}

  if(state.mediaRecorder && state.mediaRecorder.state==='recording'){ state.mediaRecorder.stop(); return; }
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true}); const chunks=[]; const rec=new MediaRecorder(stream); state.mediaRecorder=rec; state.recordingSentence=i;
    rec.ondataavailable=e=>chunks.push(e.data); rec.onstop=()=>{ const blob=new Blob(chunks,{type:'audio/webm'}); const url=URL.createObjectURL(blob); const holder=document.getElementById('rec-'+i); if(holder) holder.innerHTML=`<p>Your Recording ▶</p><audio controls src="${url}"></audio>`; stream.getTracks().forEach(t=>t.stop()); };
    rec.start(); toast('بدأ التسجيل. اضغط تسجيل مرة أخرى للإيقاف.');
  } catch(e){ toast('تعذر الوصول إلى الميكروفون.'); }
}

function initVoices(){ state.voices = speechSynthesis.getVoices(); if(!state.voiceName){ const v=state.voices.find(v=>v.lang.startsWith('de')); if(v) state.voiceName=v.name; } renderTTSSettings(); }
function persist(){ storage.set('langApp_activeTab', state.activeTab); storage.set('langApp_fontSize', state.fontSize); storage.set('langApp_darkMode', state.darkMode); storage.set('langApp_playedSentences', state.playedSentences); storage.set('langApp_quizResults', state.quizResults); storage.set('langApp_flashStatus', state.flashStatus); storage.set('langApp_streak', state.streak); }
function rerender(){ applyTheme(); renderHeader(); renderTTSSettings(); renderContent(); persist(); }

document.addEventListener('click', e=>{
  const t=e.target.closest('[data-action]');
  if(!t){ const r=e.target.closest('[data-reveal]'); if(r){ state.revealed[r.dataset.reveal]=true; renderContent(); } return; }
  const a=t.dataset.action;
  if(a==='tab'){ state.activeTab=t.dataset.tab; state.constructionCurrent=[]; }
  if(a==='fontDown') state.fontSize=Math.max(14,state.fontSize-1);
  if(a==='fontUp') state.fontSize=Math.min(20,state.fontSize+1);
  if(a==='toggleDark') state.darkMode=!state.darkMode;
  if(a==='playFull') speak(allText());
  if(a==='play') speak(t.dataset.text);
  if(a==='karaoke') speak(t.dataset.text, t.dataset.id);
  if(a==='playSentence'){ const i=t.dataset.index; state.playedSentences[i]=true; speak(textData.sentences[i].target, 's'+i); }
  if(a==='record') startRecording(t.dataset.index);
  if(a==='word') state.selectedWord=t.dataset.word;
  if(a==='hideTranslations') state.hideTranslations=!state.hideTranslations;
  if(a==='flip') state.flashFlipped=!state.flashFlipped;
  if(a==='prevFlash'){ state.flashIndex=(state.flashIndex-1+flashWords().length)%flashWords().length; state.flashFlipped=false; }
  if(a==='nextFlash'){ state.flashIndex=(state.flashIndex+1)%flashWords().length; state.flashFlipped=false; }
  if(a==='known'){ if(state.flashStatus[t.dataset.word]!=='known') addXP(2,false); state.flashStatus[t.dataset.word]='known'; state.reviewedThisSession[t.dataset.word]=true; state.flashIndex=(state.flashIndex+1)%flashWords().length; state.flashFlipped=false; }
  if(a==='review'){ state.flashStatus[t.dataset.word]='review'; state.reviewedThisSession[t.dataset.word]=true; state.flashIndex=(state.flashIndex+1)%flashWords().length; state.flashFlipped=false; }
  if(a==='answer'){ const idx=state.quizIndex; if(!state.quizResults[idx]){ state.quizResults[idx]={chosen:t.dataset.choice, correct:t.dataset.choice===textData.quiz.mcq[idx].answer}; if(state.quizResults[idx].correct) addXP(5,false); } }
  if(a==='prevQ') state.quizIndex=(state.quizIndex-1+textData.quiz.mcq.length)%textData.quiz.mcq.length;
  if(a==='nextQ') state.quizIndex=(state.quizIndex+1)%textData.quiz.mcq.length;
  if(a==='model') state.showModel[t.dataset.id]=!state.showModel[t.dataset.id];
  if(a==='toggleFill') state.fillMode=state.fillMode==='typed'?'drag':'typed';
  if(a==='checkFill') toast('تم التحقق: راجع الكلمات الصحيحة في النموذج/المفاتيح.');
  if(a==='checkCon'){ const item=textData.constructionSentences[state.constructionIndex]; toast(state.constructionCurrent.join(' ')===item.words.join(' ') ? 'إجابة صحيحة!' : 'راجع ترتيب الكلمات.'); }
  if(a==='showCon') state.constructionCurrent=[...textData.constructionSentences[state.constructionIndex].words];
  if(a==='prevCon'){ state.constructionIndex=(state.constructionIndex-1+textData.constructionSentences.length)%textData.constructionSentences.length; state.constructionCurrent=[]; }
  if(a==='nextCon'){ state.constructionIndex=(state.constructionIndex+1)%textData.constructionSentences.length; state.constructionCurrent=[]; }
  rerender();
});
document.addEventListener('input', e=>{ const a=e.target.dataset.action; if(a==='voice'){ state.voiceName=e.target.value; storage.set('langApp_voiceName',state.voiceName); } if(a==='rate'){ state.rate=Number(e.target.value); storage.set('langApp_rate',state.rate); } if(a==='pitch'){ state.pitch=Number(e.target.value); storage.set('langApp_pitch',state.pitch); } });
document.addEventListener('keydown', e=>{ if(state.activeTab==='flashcards' && e.key==='ArrowLeft'){ state.flashIndex=(state.flashIndex-1+flashWords().length)%flashWords().length; state.flashFlipped=false; rerender(); } if(state.activeTab==='flashcards' && e.key==='ArrowRight'){ state.flashIndex=(state.flashIndex+1)%flashWords().length; state.flashFlipped=false; rerender(); } if((e.key==='Enter'||e.key===' ') && e.target.dataset.action==='flip'){ e.preventDefault(); state.flashFlipped=!state.flashFlipped; rerender(); } });
document.addEventListener('dragstart', e=>{ if(e.target.dataset.dragWord) e.dataTransfer.setData('fill', e.target.dataset.dragWord); if(e.target.dataset.conWord) e.dataTransfer.setData('con', e.target.dataset.conWord); });
document.addEventListener('dragover', e=>{ if(e.target.closest('[data-drop-fill]') || e.target.closest('[data-con-drop]')) e.preventDefault(); });
document.addEventListener('drop', e=>{ const fill=e.target.closest('[data-drop-fill]'); const con=e.target.closest('[data-con-drop]'); if(fill){ e.preventDefault(); state.dragAnswers[fill.dataset.dropFill]=e.dataTransfer.getData('fill'); rerender(); } if(con){ e.preventDefault(); const w=e.dataTransfer.getData('con'); if(w) state.constructionCurrent.push(w); rerender(); } });

visitReward(); applyTheme(); renderHeader(); renderTTSSettings(); renderContent(); initVoices(); speechSynthesis.onvoiceschanged=initVoices;
</script>
<script src="nav.js"></script>
</body>
