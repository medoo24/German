function handleAction(e){const a=e.target.closest('[data-action]'); if(!a)return; const act=a.dataset.action; if(act==='tab'){state.activeTab=a.dataset.tab;save();renderContent();} if(act==='fontDown'){state.fontSize=Math.max(14,state.fontSize-1);setTheme();save();} if(act==='fontUp'){state.fontSize=Math.min(20,state.fontSize+1);setTheme();save();} if(act==='toggleDark'){state.dark=!state.dark;setTheme();save();renderHeader();} if(act==='playFull')speak(textData.paragraphs.map(p=>p.target).join('\n'));

 if(act==='known'){const w=flashWords[state.flashIndex]; if(mastery[w]!=='known'){state.xp+=2;} mastery[w]='known';state.reviewed.add(w);save();renderHeader();renderContent();} if(act==='review'){const w=flashWords[state.flashIndex]; mastery[w]='review';flashWords.push(w);state.reviewed.add(w);save();renderContent();}
 if(act==='answer'){const idx='q'+state.quizIndex;if(!quizResults[idx]){quizResults[idx]={chosen:a.dataset.letter,correct:a.dataset.letter===textData.quiz.mcq[state.quizIndex].answer};if(quizResults[idx].correct)state.xp+=5;save();renderHeader();renderContent();}} if(act==='nextQuiz'){state.quizIndex=(state.quizIndex+1)%textData.quiz.mcq.length;renderContent();} if(act==='prevQuiz'){state.quizIndex=(state.quizIndex-1+textData.quiz.mcq.length)%textData.quiz.mcq.length;renderContent();}

 if(act==='record')startRecord(+a.dataset.index); if(act==='stopRecord')stopRecord(+a.dataset.index);

document.addEventListener('click',handleAction);document.addEventListener('change',handleAction);document.addEventListener('input',handleAction);
document.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){const a=document.activeElement?.dataset?.action;if(a==='flip'){e.preventDefault();state.flashFlipped=!state.flashFlipped;renderContent();}} if(state.activeTab==='flashcards'&&e.key==='ArrowRight'){state.flashIndex=(state.flashIndex+1)%flashWords.length;renderContent();} if(state.activeTab==='flashcards'&&e.key==='ArrowLeft'){state.flashIndex=(state.flashIndex-1+flashWords.length)%flashWords.length;renderContent();}});
document.addEventListener('drop',e=>{const drop=e.target.closest('.blank-drop,.construct-zone'); if(!drop)return; e.preventDefault();const t=e.dataTransfer.getData('text/plain'); if(drop.classList.contains('construct-zone'))drop.insertAdjacentHTML('beforeend',`<span class="px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-700">${t}</span>`); else drop.textContent=t;});
async function startRecord(i){try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});const rec=new MediaRecorder(stream);state.chunks[i]=[];rec.ondataavailable=e=>state.chunks[i].push(e.data);rec.onstop=()=>{const blob=new Blob(state.chunks[i],{type:'audio/webm'});const url=URL.createObjectURL(blob);document.getElementById('audio-'+i).innerHTML=`<p>Your Recording ▶</p><audio controls src="${url}"></audio>`;stream.getTracks().forEach(t=>t.stop());};state.recorders[i]=rec;rec.start();document.getElementById('stop-'+i)?.classList.remove('hidden');}catch(err){toast('Microphone permission is needed for recording.');}}
function stopRecord(i){state.recorders[i]?.stop();document.getElementById('stop-'+i)?.classList.add('hidden');}
function loadVoices(){state.voices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('de')||v.lang.startsWith('ar')||v.default);if(!state.voiceURI&&state.voices[0])state.voiceURI=(state.voices.find(v=>v.lang.startsWith('de'))||state.voices[0]).voiceURI;renderHeader();}
setTheme();initDaily();loadVoices();speechSynthesis.onvoiceschanged=loadVoices;renderHeader();renderContent();
</script>
