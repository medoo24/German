function initDaily(){
  const today = new Date().toISOString().slice(0,10), last = localStorage.getItem('langApp_lastVisit');

    state.streak = last === yesterday ? state.streak + 1 : 1; state.xp += 10; localStorage.setItem('langApp_lastVisit', today); save();
  }
}

function speak(text, karaokeId){ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.lang='de-DE'; u.rate=state.rate; u.pitch=state.pitch; const v=state.voices.find(v=>v.voiceURI===state.voiceURI)||state.voices.find(v=>v.lang.startsWith('de')); if(v) u.voice=v; if(karaokeId){ u.onboundary=e=>{ if(e.name==='word'||e.charIndex>=0){ document.querySelectorAll(`#${karaokeId} [data-start]`).forEach(s=>s.classList.remove('karaoke-highlight')); const span=[...document.querySelectorAll(`#${karaokeId} [data-start]`)].reverse().find(s=>Number(s.dataset.start)<=e.charIndex); if(span) span.classList.add('karaoke-highlight'); }}; u.onend=()=>document.querySelectorAll(`#${karaokeId} [data-start]`).forEach(s=>s.classList.remove('karaoke-highlight')); } speechSynthesis.speak(u); }
function wrapWords(text){ let out='', re=/[A-Za-zÄÖÜäöüßéÉ]+/g, last=0, m; while((m=re.exec(text))){ out+=escapeHTML(text.slice(last,m.index))+`<span data-start="${m.index}">${escapeHTML(m[0])}</span>`; last=re.lastIndex;} return out+escapeHTML(text.slice(last)); }

function escapeHTML(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

document.addEventListener('click', async e=>{
  const el=e.target.closest('[data-action]'); if(!el) return; const a=el.dataset.action;

  if(a==='review'){ state.flash[el.dataset.word]='review'; state.flashIndex++; state.flashFlipped=false; save(); render(); }
  if(a==='answerMCQ'){ const key='mcq'+el.dataset.i; if(!state.quiz[key]){ state.quiz[key]=el.dataset.choice; if(el.dataset.choice===textData.quiz.mcq[el.dataset.i].answer) awardXP(5); save(); render(); }}
  if(a==='toggleModel'){ document.getElementById(el.dataset.target)?.classList.toggle('hidden'); }
  if(a==='toggleFill'){ state.fillMode=state.fillMode==='typed'?'drag':'typed'; state.fillAnswers={}; state.dragAnswers={}; render(); }
  if(a==='checkFill'){ document.querySelectorAll('[data-fill]').forEach(inp=>{ const [i,j]=inp.dataset.fill.split('-').map(Number); const ans=textData.quiz.fillInTheBlank[i].blanks[j]; state.fillAnswers[inp.dataset.fill]={ok:inp.value.trim().toLowerCase()===ans.toLowerCase()}; }); if(state.fillMode==='drag'){ Object.keys(state.dragAnswers).forEach(k=>{ const [i,j]=k.split('-').map(Number); const ans=textData.quiz.fillInTheBlank[i].blanks[j]; state.fillAnswers[k]={ok:state.dragAnswers[k]===ans}; }); } render(); }
  if(a==='checkConstruction'){ const c=textData.constructionSentences[state.constructionIndex]; state.constructionFeedback=state.constructionZone.map((idx,pos)=>idx===pos); render(); }
  if(a==='showConstruction'){ const c=textData.constructionSentences[state.constructionIndex]; state.constructionZone=c.words.map((_,i)=>i); state.constructionFeedback=c.words.map(()=>true); render(); }
  if(a==='nextConstruction'){ state.constructionIndex=(state.constructionIndex+1)%textData.constructionSentences.length; state.constructionZone=[]; state.constructionFeedback=[]; render(); }
  if(a==='prevConstruction'){ state.constructionIndex=(state.constructionIndex-1+textData.constructionSentences.length)%textData.constructionSentences.length; state.constructionZone=[]; state.constructionFeedback=[]; render(); }
  if(a==='record'){ try{ const stream=await navigator.mediaDevices.getUserMedia({audio:true}); const rec=new MediaRecorder(stream); const chunks=[]; rec.ondataavailable=ev=>chunks.push(ev.data); rec.onstop=()=>{ const blob=new Blob(chunks,{type:'audio/webm'}); const url=URL.createObjectURL(blob); document.getElementById('recording-'+el.dataset.index).innerHTML=`<p class="text-sm font-semibold">Your Recording ▶</p><audio controls src="${url}"></audio>`; stream.getTracks().forEach(t=>t.stop()); }; rec.start(); state.mediaRecorders[el.dataset.index]=rec; toast('Recording started'); }catch(err){ toast('Microphone permission is needed.'); }}
  if(a==='stopRecord'){ const rec=state.mediaRecorders[el.dataset.index]; if(rec && rec.state!=='inactive'){ rec.stop(); toast('Recording stopped'); }}
});
document.addEventListener('change', e=>{ const a=e.target.dataset.action; if(a==='voice'){ state.voiceURI=e.target.value; save(); } if(a==='rate'){ state.rate=Number(e.target.value); save(); } if(a==='pitch'){ state.pitch=Number(e.target.value); save(); }});
document.addEventListener('keydown', e=>{ if(state.activeTab==='Flashcards' && ['ArrowRight','ArrowLeft','Enter',' '].includes(e.key)){ if(e.key==='ArrowRight') state.flashIndex++; if(e.key==='ArrowLeft') state.flashIndex=Math.max(0,state.flashIndex-1); if(e.key==='Enter'||e.key===' ') state.flashFlipped=!state.flashFlipped; render(); }});
document.addEventListener('dragstart', e=>{ if(e.target.dataset.dragWord) e.dataTransfer.setData('text/plain','fill:'+e.target.dataset.dragWord); if(e.target.dataset.conWord) e.dataTransfer.setData('text/plain','con:'+e.target.dataset.conWord); });
document.addEventListener('dragover', e=>{ if(e.target.closest('[data-drop]')||e.target.closest('[data-construction-drop]')) e.preventDefault(); });
document.addEventListener('drop', e=>{ const data=e.dataTransfer.getData('text/plain'); const drop=e.target.closest('[data-drop]'); if(drop && data.startsWith('fill:')){ state.dragAnswers[drop.dataset.drop]=data.slice(5); render(); } const cdrop=e.target.closest('[data-construction-drop]'); if(cdrop && data.startsWith('con:')){ const idx=Number(data.slice(4)); if(!state.constructionZone.includes(idx)) state.constructionZone.push(idx); render(); }});
function loadVoices(){ state.voices=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('de')).concat(speechSynthesis.getVoices().filter(v=>!v.lang.startsWith('de'))); if(!state.voiceURI && state.voices[0]) state.voiceURI=state.voices[0].voiceURI; render(); }
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged=loadVoices; setTimeout(loadVoices,100); }
initDaily(); render(); checkBadges();
</script>
