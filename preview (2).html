function renderFlashcards(c){ const keys=Object.keys(textData.dictionary); const word=keys[state.cardIndex%keys.length]; const d=textData.dictionary[word]; const reviewed=Object.keys(state.flash).length; c.innerHTML = `<article class="max-w-xl mx-auto"><div class="mb-3 h-3 bg-slate-200 rounded"><div class="h-3 bg-current rounded" style="width:${reviewed/keys.length*100}%"></div></div><p class="text-center mb-3">${state.cardIndex+1} of ${keys.length} · ${reviewed} cards reviewed</p><div tabindex="0" data-action="flip" class="card ${state.flipped?'flipped':''} relative h-72 cursor-pointer"><div class="card-inner absolute inset-0"><section class="card-face absolute inset-0 p-8 rounded-3xl bg-white dark:bg-slate-800 border dark:border-slate-700 shadow flex flex-col items-center justify-center"><h2 class="text-4xl font-bold">${word}</h2><p class="mt-3 text-slate-500">${d.ipa}</p><button data-action="play-word" data-word="${word}" class="mt-5 px-3 py-2 rounded-xl bg-blue-600 text-white">Play</button></section><section class="card-face card-back absolute inset-0 p-8 rounded-3xl bg-white dark:bg-slate-800 border dark:border-slate-700 shadow flex flex-col items-center justify-center"><h2 class="text-2xl font-bold">${d.translation}</h2><span class="mt-2 px-2 py-1 rounded ${posClass(d.pos)}">${d.pos}</span><p class="mt-4 text-center">${d.examples[0]}</p><button data-action="play-word" data-word="${word}" class="mt-5 px-3 py-2 rounded-xl bg-blue-600 text-white">Play</button></section></div></div><div class="flash-controls mt-5 flex flex-wrap justify-center gap-2"><button data-action="prev-card" class="px-4 py-2 rounded-xl border dark:border-slate-600">Previous</button><button data-action="next-card" class="px-4 py-2 rounded-xl border dark:border-slate-600">Next</button><button data-action="known" data-word="${word}" class="px-4 py-2 rounded-xl bg-green-600 text-white">Known +2 XP</button><button data-action="review" data-word="${word}" class="px-4 py-2 rounded-xl bg-orange-500 text-white">Needs Review</button></div></article>`; }
function renderQuiz(c){ const q=textData.quiz.mcq[state.quizIndex]; c.innerHTML = `<article class="grid gap-6"><section class="p-5 rounded-2xl bg-white dark:bg-slate-800 border dark:border-slate-700"><h2 class="text-xl font-bold">Multiple Choice</h2><p class="mt-3 font-semibold">${state.quizIndex+1}. ${q.question}</p><div class="mt-3 grid gap-2" role="radiogroup">${q.options.map(opt=>{const letter=opt[0], res=state.quiz[state.quizIndex]; let cls='border dark:border-slate-600'; if(res){ if(letter===q.answer) cls='bg-green-100 text-green-900'; else if(letter===res.chosen) cls='bg-red-100 text-red-900'; } return `<button data-action="answer" data-letter="${letter}" class="text-left px-4 py-3 rounded-xl ${cls}">${opt}</button>`}).join('')}</div><details class="mt-3"><summary class="cursor-pointer">Show Model Answer</summary><p class="mt-2">${q.model}</p></details><div class="quiz-controls mt-4 flex gap-2"><button data-action="prev-quiz" class="px-3 py-2 rounded-xl border dark:border-slate-600">Previous</button><button data-action="next-quiz" class="px-3 py-2 rounded-xl border dark:border-slate-600">Next</button></div></section>${openEndedHTML()}${fillHTML()}${constructionHTML()}</article>`; }
function openEndedHTML(){ return `<section class="p-5 rounded-2xl bg-white dark:bg-slate-800 border dark:border-slate-700"><h2 class="text-xl font-bold">Open-Ended Questions</h2>${textData.quiz.openEnded.map((o,i)=>`<div class="mt-4"><label class="font-semibold block">${o.question}</label><textarea class="mt-2 w-full p-3 rounded-xl border dark:bg-slate-900 dark:border-slate-700" rows="3"></textarea><details class="mt-2"><summary class="cursor-pointer">Show Model Answer</summary><p>${o.modelAnswer}</p></details></div>`).join('')}</section>`; }
function fillHTML(){ const blanks=textData.quiz.fillInTheBlank.flatMap(x=>x.blanks); return `<section class="p-5 rounded-2xl bg-white dark:bg-slate-800 border dark:border-slate-700"><div class="flex justify-between gap-2"><h2 class="text-xl font-bold">Fill in the Blank</h2><button data-action="toggle-fill-mode" class="px-3 py-2 rounded-xl border dark:border-slate-600">${state.fillDrag?'Typed mode':'Drag mode'}</button></div>${textData.quiz.fillInTheBlank.map((f,i)=>`<div class="mt-4" data-fill="${i}"><p>${f.template.replace('___', state.fillDrag?`<span data-action="drop-fill" data-i="${i}" class="inline-block min-w-24 border-b-2 p-1">Drop here</span>`:`<input data-fill-input="${i}" class="w-32 p-1 rounded border dark:bg-slate-900 dark:border-slate-700" aria-label="blank ${i+1}">`)}</p><p class="text-sm text-slate-500">Hint: ${f.hint}</p></div>`).join('')}${state.fillDrag?`<div class="mt-4 flex flex-wrap gap-2">${blanks.sort(()=>.5-Math.random()).map(w=>`<span draggable="true" data-drag-word="${w}" class="px-3 py-2 rounded-xl bg-slate-100 dark:bg-slate-700 cursor-grab">${w}</span>`).join('')}</div>`:''}<button data-action="check-fill" class="mt-4 px-4 py-2 rounded-xl bg-blue-600 text-white">Check</button><div id="fillResult" class="mt-3"></div></section>`; }
function constructionHTML(){ const item=textData.constructionSentences[state.constructionIndex]; const scrambled=[...item.words].sort(()=>.5-Math.random()); return `<section class="p-5 rounded-2xl bg-white dark:bg-slate-800 border dark:border-slate-700"><h2 class="text-xl font-bold">Sentence Construction</h2><p class="mt-2">Prompt: ${item.translation}</p><div id="constructionZone" class="min-h-16 mt-3 p-3 rounded-xl border-2 border-dashed dark:border-slate-600 flex flex-wrap gap-2">${state.constructionZone.map((w,i)=>`<span class="px-3 py-2 rounded-xl bg-blue-100 text-blue-900">${w}</span>`).join('')}</div><div class="mt-3 flex flex-wrap gap-2">${scrambled.map(w=>`<button data-action="add-construction" data-word="${w}" class="px-3 py-2 rounded-xl bg-slate-100 dark:bg-slate-700">${w}</button>`).join('')}</div><div class="mt-4 flex gap-2 flex-wrap"><button data-action="check-construction" class="px-3 py-2 rounded-xl bg-blue-600 text-white">Check</button><button data-action="show-construction" class="px-3 py-2 rounded-xl border dark:border-slate-600">Show Answer</button><button data-action="prev-construction" class="px-3 py-2 rounded-xl border dark:border-slate-600">Previous</button><button data-action="next-construction" class="px-3 py-2 rounded-xl border dark:border-slate-600">Next</button><button data-action="clear-construction" class="px-3 py-2 rounded-xl border dark:border-slate-600">Clear</button></div><div id="constructionResult" class="mt-3"></div></section>`; }
function renderSettings(c){ voices=speechSynthesis.getVoices(); const de=voices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith('de')); c.innerHTML=`<article class="p-5 rounded-2xl bg-white dark:bg-slate-800 border dark:border-slate-700 max-w-2xl"><h2 class="text-xl font-bold">Text-to-Speech Settings</h2><label class="mt-4 block">Voice<select data-action="voice" class="mt-1 w-full p-2 rounded border dark:bg-slate-900 dark:border-slate-700">${de.map((v,i)=>`<option value="${voices.indexOf(v)}">${v.name} (${v.lang})</option>`).join('')}</select></label><label class="mt-4 block">Speed <input data-action="rate" type="range" min="0.6" max="1.3" step="0.1" value="${rate}" class="w-full"></label><label class="mt-4 block">Pitch <input data-action="pitch" type="range" min="0.6" max="1.5" step="0.1" value="${pitch}" class="w-full"></label><button data-action="play-text" data-text="Heute ist der erste Schultag." class="mt-4 px-3 py-2 rounded-xl bg-blue-600 text-white">Test Voice</button></article>`; }
function renderPrint(){ document.getElementById('printText').innerHTML=textData.paragraphs.map(p=>`<p><strong>${p.target}</strong></p><p>${p.base}</p>`).join(''); document.getElementById('printVocab').innerHTML=`<h2>Vocabulary Reference</h2><table border="1" cellspacing="0" cellpadding="6"><thead><tr><th>Word</th><th>Translation</th><th>Part of Speech</th><th>Context Note</th></tr></thead><tbody>${Object.entries(textData.dictionary).map(([w,d])=>`<tr><td>${w}</td><td>${d.translation}</td><td>${d.pos}</td><td>${d.context}</td></tr>`).join('')}</tbody></table>`; }
async function record(i){ try{ const stream=await navigator.mediaDevices.getUserMedia({audio:true}); state.chunks=[]; state.mediaRecorder=new MediaRecorder(stream); state.mediaRecorder.ondataavailable=e=>state.chunks.push(e.data); state.mediaRecorder.onstop=()=>{ const blob=new Blob(state.chunks,{type:'audio/webm'}); const url=URL.createObjectURL(blob); const box=document.getElementById('recording'+i); if(box) box.innerHTML=`<p class="text-sm font-semibold">Your Recording ▶</p><audio controls src="${url}"></audio>`; }; state.mediaRecorder.start(); toast('Recording started'); }catch(e){toast('Microphone permission was not available.');}}
document.addEventListener('click', async e=>{ const b=e.target.closest('[data-action]'); if(!b) return; const a=b.dataset.action; if(a==='tab'){state.activeTab=b.dataset.tab; save(); renderTabs(); renderContent();} if(a==='toggle-dark'){state.dark=!state.dark; save(); init();} if(a==='font-up'){state.fontSize=Math.min(20,state.fontSize+1); save(); init();} if(a==='font-down'){state.fontSize=Math.max(14,state.fontSize-1); save(); init();} if(a==='play-full') speak(textData.paragraphs.map(p=>p.target).join(' ')); if(a==='play-para'||a==='karaoke-para'){let i=+b.dataset.i; speak(textData.paragraphs[i].target,null,document.getElementById('para'+i));} if(a==='play-sent'){let i=+b.dataset.i; speak(textData.sentences[i].target,i,document.getElementById('sent'+i));} if(a==='play-text') speak(b.dataset.text); if(a==='record') record(+b.dataset.i); if(a==='stop-record'&&state.mediaRecorder){state.mediaRecorder.stop(); toast('Recording saved below the sentence');} if(a==='toggle-hide'){state.hideTranslations=!state.hideTranslations; renderContent();} if(a==='reveal') b.classList.remove('blurred'); if(a==='select-word'){state.selectedWord=b.dataset.word; renderContent();} if(a==='play-word') speak(b.dataset.word); if(a==='flip'){state.flipped=!state.flipped; renderContent();} if(a==='next-card'){state.cardIndex=(state.cardIndex+1)%Object.keys(textData.dictionary).length; state.flipped=false; renderContent();} if(a==='prev-card'){state.cardIndex=(state.cardIndex-1+Object.keys(textData.dictionary).length)%Object.keys(textData.dictionary).length; state.flipped=false; renderContent();} if(a==='known'){ if(state.flash[b.dataset.word]!=='known'){state.xp+=2; toast('+2 XP');} state.flash[b.dataset.word]='known'; save(); renderHeader(); renderContent();} if(a==='review'){state.flash[b.dataset.word]='review'; state.cardIndex++; save(); renderContent();} if(a==='answer'){let idx=state.quizIndex, q=textData.quiz.mcq[idx]; if(!state.quiz[idx]){state.quiz[idx]={chosen:b.dataset.letter, correct:b.dataset.letter===q.answer}; if(b.dataset.letter===q.answer){state.xp+=5; toast('+5 XP');} save(); renderHeader(); renderContent();}} if(a==='next-quiz'){state.quizIndex=(state.quizIndex+1)%textData.quiz.mcq.length; renderContent();} if(a==='prev-quiz'){state.quizIndex=(state.quizIndex-1+textData.quiz.mcq.length)%textData.quiz.mcq.length; renderContent();} if(a==='toggle-fill-mode'){state.fillDrag=!state.fillDrag; renderContent();} if(a==='check-fill'){document.getElementById('fillResult').innerHTML='Answers: '+textData.quiz.fillInTheBlank.map(f=>f.blanks.join(', ')).join(' · ');} if(a==='add-construction'){state.constructionZone.push(b.dataset.word); renderContent();} if(a==='clear-construction'){state.constructionZone=[]; renderContent();} if(a==='show-construction'){state.constructionZone=[...textData.constructionSentences[state.constructionIndex].words]; renderContent();} if(a==='check-construction'){const item=textData.constructionSentences[state.constructionIndex]; document.getElementById('constructionResult').innerHTML = state.constructionZone.join(' ')===item.words.join(' ')?'<span class="text-green-600 font-bold">Correct!</span>':'<span class="text-red-600 font-bold">Some words are not in the right position.</span>'; } if(a==='next-construction'){state.constructionIndex=(state.constructionIndex+1)%textData.constructionSentences.length; state.constructionZone=[]; renderContent();} if(a==='prev-construction'){state.constructionIndex=(state.constructionIndex-1+textData.constructionSentences.length)%textData.constructionSentences.length; state.constructionZone=[]; renderContent();} badgeCheck(); });
document.addEventListener('keydown', e=>{ if(state.activeTab==='Flashcards'){ if(e.key==='ArrowRight'){state.cardIndex++; state.flipped=false; renderContent();} if(e.key==='ArrowLeft'){state.cardIndex=Math.max(0,state.cardIndex-1); state.flipped=false; renderContent();} if((e.key==='Enter'||e.key===' ')&&e.target.dataset.action==='flip'){state.flipped=!state.flipped; renderContent();} }});
document.addEventListener('input', e=>{ if(e.target.dataset.action==='rate') rate=+e.target.value; if(e.target.dataset.action==='pitch') pitch=+e.target.value; if(e.target.dataset.action==='voice') selectedVoice=voices[+e.target.value]; });
speechSynthesis.onvoiceschanged=()=>voices=speechSynthesis.getVoices();
init();
</script>
<script src="nav.js"></script>
